<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Komorebi — editor</title>
<style>
  :root { color-scheme: dark; }
  html,body { margin:0; height:100%; background:#0a0d0a; overflow:hidden; }
  #gl { display:block; width:100vw; height:100vh; cursor:crosshair; touch-action:none;   /* none: let swipe gestures through, no scroll/pull-to-refresh */
        -webkit-user-select:none; user-select:none; -webkit-touch-callout:none; }   /* and no iOS text-selection callout on the press-and-hold peek */
  #hud {                                              /* bottom-right, above #hint — clear of the left dev panel */
    position:fixed; right:10px; bottom:38px; text-align:right; font:11px/1.4 ui-monospace,Menlo,Consolas,monospace;
    color:#9fb89f; background:rgba(0,0,0,.35); padding:6px 8px; border-radius:6px;
    pointer-events:none; white-space:pre;
  }
  #hint {
    position:fixed; right:10px; bottom:10px; font:11px ui-monospace,monospace;
    color:#6b7d6b; background:rgba(0,0,0,.3); padding:4px 7px; border-radius:6px; pointer-events:none;
  }
  #dev {
    position:fixed; top:0; left:0; height:100vh; width:280px; box-sizing:border-box;
    overflow-y:auto; padding:8px 10px 40px; background:rgba(8,12,8,.82);
    backdrop-filter:blur(6px); border-right:1px solid #1c2a1c;
    font:11px/1.3 ui-monospace,Menlo,Consolas,monospace; color:#cfe0cf;
  }
  #dev.hidden { display:none; }
  #dev h2 { font-size:11px; margin:14px 0 4px; color:#7fae7f; text-transform:uppercase; letter-spacing:.08em; }
  #dev h2:first-child { margin-top:2px; }
  #dev details { margin:0; }
  #dev summary { list-style:none; cursor:pointer; }
  #dev summary::-webkit-details-marker { display:none; }
  #dev summary::before { content:'▸ '; color:#5a7a5a; }
  #dev details[open] > summary::before { content:'▾ '; }
  #dev summary.sec { font-size:11px; margin:14px 0 4px; color:#7fae7f; text-transform:uppercase; letter-spacing:.08em; }
  #dev summary.adv { font-size:11px; margin:8px 0 3px; color:#6f8a6f; }
  .ctl { display:flex; align-items:center; gap:6px; margin:3px 0; }
  .ctl label { flex:0 0 96px; color:#9fb89f; }
  .ctl input[type=range] { flex:1; min-width:0; height:14px; accent-color:#c99; }
  .ctl .val { flex:0 0 46px; text-align:right; color:#e8d9a8; }
  .ctl.toggle label, .ctl.select label { flex:0 0 96px; }
  .ctl select { flex:1; background:#10180f; color:#cfe0cf; border:1px solid #243; }
  .ctl button { background:#1a2a1a; color:#cfe0cf; border:1px solid #2c452c; border-radius:4px; padding:3px 8px; cursor:pointer; }
  .ctl button:hover { background:#243c24; }
  .err { position:fixed; inset:0; display:flex; align-items:center; justify-content:center;
         color:#e88; font:14px ui-monospace,monospace; text-align:center; padding:40px; }
  #tip {
    position:fixed; max-width:300px; z-index:10; pointer-events:none; display:none;
    font:11px/1.55 ui-monospace,Menlo,Consolas,monospace; color:#dfe9df;
    background:rgba(10,16,10,.97); border:1px solid #2c452c; border-radius:6px;
    padding:8px 10px; box-shadow:0 8px 28px rgba(0,0,0,.55);
  }
  #tip b { color:#cbe6a8; font-weight:600; }

  /* ---- auto-profiler: cost breakdown panel (sits beside the dev panel) ---- */
  #prof { position:fixed; left:300px; top:8px; width:300px; max-height:92vh; overflow:auto; z-index:20;
    font:11px/1.45 ui-monospace,Menlo,Consolas,monospace; color:#cfe0cf;
    background:rgba(8,12,8,.95); border:1px solid #2c452c; border-radius:8px; padding:10px 12px; display:none; }
  #prof.show { display:block; }
  #prof h3 { margin:6px 0 8px; color:#7fae7f; font-size:11px; text-transform:uppercase; letter-spacing:.08em; }
  #prof h3:first-child { margin-top:0; }
  #prof .row { margin:5px 0; overflow:hidden; }
  #prof .k { color:#9fb89f; } #prof .v { color:#e8d9a8; float:right; }
  #prof .bar { height:6px; background:#1c2a1c; border-radius:3px; margin:2px 0 7px; overflow:hidden; }
  #prof .bar i { display:block; height:100%; background:#c99; }
  #prof .warn { color:#e8b06a; margin:8px 0; line-height:1.5; }
  #prof button { background:#1a2a1a; color:#cfe0cf; border:1px solid #2c452c; border-radius:4px; padding:3px 8px; cursor:pointer; }
  /* ---- auto-profiler: A/B wipe (variant on a stacked canvas, current beneath, draggable divider) ---- */
  #cmp { position:fixed; inset:0; z-index:25; display:none; }
  #cmp.show { display:block; }
  #cmpCanvas { position:absolute; inset:0; width:100vw; height:100vh; display:block; }   /* variant, clipped left of the divider */
  #cmpBar { position:absolute; top:0; bottom:0; width:2px; margin-left:-1px; background:#f0e0a8; cursor:ew-resize; z-index:26;
    box-shadow:0 0 12px rgba(240,224,168,.6); touch-action:none; }
  #cmpBar::after { content:'↔'; position:absolute; top:50%; left:-9px; color:#0a0d0a; background:#f0e0a8; border-radius:10px;
    width:16px; height:16px; line-height:16px; text-align:center; font:11px monospace; transform:translateY(-50%); }
  #cmpInfo { position:fixed; left:50%; bottom:24px; transform:translateX(-50%); z-index:27; display:none; gap:8px; align-items:center;
    font:11px ui-monospace,monospace; color:#cfe0cf; background:rgba(8,12,8,.92); border:1px solid #2c452c; border-radius:8px; padding:8px 10px; }
  #cmpInfo .cuts { color:#9fb89f; max-width:42vw; }
  #cmpInfo button { background:#1a2a1a; color:#cfe0cf; border:1px solid #2c452c; border-radius:4px; padding:4px 9px; cursor:pointer; }
  #cmpInfo .pill { padding:4px 9px; border-radius:12px; background:#10180f; cursor:pointer; border:1px solid #243; }
  #cmpInfo .pill.on { background:#243c24; color:#e8d9a8; border-color:#3c5c3c; }
  /* per-engine fps, one each side of the wipe: variant (left, gold like the divider) vs current (right) */
  #cmpFps { position:fixed; top:10px; left:0; right:0; z-index:27; display:none; justify-content:space-between;
    padding:0 14px; font:12px ui-monospace,monospace; color:#cfe0cf; pointer-events:none; }
  #cmpFps.show { display:flex; }
  #cmpFps span { background:rgba(8,12,8,.85); border:1px solid #2c452c; border-radius:6px; padding:4px 9px; }
  #cmpFps .vlabel { color:#f0e0a8; }

  /* ---- welcome gate: a faint 'memories' background under an intro overlay ---- */
  #gl { transition: opacity 1.6s ease; }
  body.intro #gl { opacity: .33; }                  /* super-faint teaser of the look */
  #welcome {
    position: fixed; inset: 0; z-index: 30; display: flex; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
    background: radial-gradient(ellipse at center, rgba(8,12,8,.5) 0%, rgba(8,12,8,.12) 58%, rgba(8,12,8,0) 100%);
    transition: opacity .9s ease, filter .9s ease, transform .9s ease;
  }
  #welcome.out { opacity: 0; filter: blur(10px); transform: scale(1.04); pointer-events: none; }
  #welcome .w { max-width: 560px; display: flex; flex-direction: column; align-items: center; gap: 22px;
    animation: welcome-in 1.4s ease both; }
  @keyframes welcome-in { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: none; } }
  #welcome h1 { margin: 0; font: 300 clamp(42px, 9vw, 78px)/1 "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    letter-spacing: .03em; color: #f2f6ee; text-shadow: 0 2px 30px rgba(0,0,0,.5); }
  #welcome h1 .jp { display: block; margin-top: .38em; font-size: .3em; letter-spacing: .5em;
    color: #9fb89f; font-weight: 400; text-indent: .5em; }   /* indent balances the trailing letter-space */
  #welcome p { margin: 0; max-width: 30em; color: #cedcc5; text-shadow: 0 1px 16px rgba(0,0,0,.55);
    font: 400 clamp(15px,2.2vw,19px)/1.65 ui-serif,Georgia,"Times New Roman",serif; }
  #welcome .feel { margin-top: 8px; cursor: pointer; color: #f1e7cf;            /* warm sunlight, not terminal green */
    font: italic 400 clamp(19px,2.7vw,23px)/1 "Iowan Old Style","Palatino Linotype",Palatino,Georgia,serif;
    letter-spacing: .015em; padding: 10px 32px; border-radius: 40px;
    background: rgba(240,224,168,.05); border: 1px solid rgba(232,217,168,.30);
    box-shadow: 0 0 0 rgba(240,224,168,0);
    transition: color .45s ease, background .45s ease, border-color .45s ease, box-shadow .55s ease, transform .35s ease; }
  #welcome .feel:hover { color: #fff8e6; background: rgba(240,224,168,.11); border-color: rgba(240,224,168,.6);
    box-shadow: 0 0 34px rgba(240,224,168,.28); transform: translateY(-1px); }   /* light blooming through */
  #welcome .feel:active { transform: translateY(0); }
  /* dev panel slides in from the left on first reveal; afterwards D just toggles it */
  #dev { transition: transform .6s cubic-bezier(.22,.61,.36,1); }
  #dev.offscreen { transform: translateX(-100%); }
  /* key hints fade in once the editor arrives */
  #hint { transition: opacity .8s ease; }
  #hint.gone { opacity: 0; pointer-events: none; }
</style>
</head>
<body class="intro">
<canvas id="gl"></canvas>
<div id="dev" class="hidden"></div>
<div id="hud"></div>
<div id="hint" class="gone"><b>← →</b> change scene · <b>D</b> dev · <b>T</b> tree view · <b>F</b> full · drag = move sun</div>
<div id="tip"></div>
<div id="prof"></div>
<div id="cmp"><div id="cmpBar"></div></div>
<div id="cmpFps"><span class="vlabel" id="cmpFpsV"></span><span id="cmpFpsM"></span></div>
<div id="cmpInfo"></div>
<div id="welcome">
  <div class="w">
    <h1>Komorebi<span class="jp">木漏れ日</span></h1>
    <p>Sunlight that leaks through the leaves of trees — and the soft, shifting dapples it scatters on the ground.</p>
    <button id="feel" class="feel" type="button">feel</button>
  </div>
</div>

<script type="module" src="./editor.js"></script>
</body>
</html>
